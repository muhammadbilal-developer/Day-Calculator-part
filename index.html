<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadoras — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      background: #faf7f4;
      color: #21253f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .preview-header {
      background: #292c53;
      color: #fff;
      padding: 1rem 1.25rem 0;
      box-shadow: 0 4px 20px rgba(41, 44, 83, 0.2);
    }
    .preview-header h1 {
      margin: 0 0 0.75rem;
      font-size: 1.125rem;
      font-weight: 600;
    }
    .preview-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-bottom: 0;
    }
    .preview-tab {
      border: none;
      border-radius: 10px 10px 0 0;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.625rem 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    @media (min-width: 640px) {
      .preview-tab { font-size: 0.875rem; padding: 0.75rem 1.25rem; }
      .preview-header h1 { font-size: 1.25rem; }
    }
    .preview-tab:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }
    .preview-tab.is-active {
      background: #faf7f4;
      color: #21253f;
    }
    .preview-main {
      flex: 1;
      padding: 1.25rem;
      display: flex;
      justify-content: center;
    }
    .preview-frame-wrap {
      width: 100%;
      max-width: 52rem;
      display: none;
    }
    .preview-frame-wrap.is-active {
      display: block;
    }
    .preview-frame {
      width: 100%;
      height: 480px;
      min-height: 0;
      border: none;
      border-radius: 12px;
      background: transparent;
      display: block;
    }
    .preview-note {
      margin: 0.5rem 0 0;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.65);
    }
  </style>
</head>
<body>
  <header class="preview-header">
    <h1>Contador de Dias — Preview das Calculadoras</h1>
    <p class="preview-note">Somente para visualização. No WordPress, use cada pasta separadamente.</p>
    <nav class="preview-tabs" aria-label="Selecionar calculadora">
      <button type="button" class="preview-tab is-active" data-tool="contador-de-dias">Contador de Dias (3 abas)</button>
      <button type="button" class="preview-tab" data-tool="dias-uteis">Calculadora Dias Úteis</button>
    </nav>
  </header>
  <main class="preview-main">
    <div class="preview-frame-wrap is-active" id="wrap-contador-de-dias">
      <iframe class="preview-frame" src="contador-de-dias/index.html" title="Contador de Dias — 3 abas"></iframe>
    </div>
    <div class="preview-frame-wrap" id="wrap-dias-uteis">
      <iframe class="preview-frame" src="dias-uteis/index.html" title="Calculadora Dias Úteis"></iframe>
    </div>
  </main>
  <script>
    function resizeIframe(iframe, height) {
      if (!iframe || !height) return;
      iframe.style.height = Math.max(height, 320) + "px";
    }

    window.addEventListener("message", (event) => {
      if (event.data?.type !== "cdc-embed-height") return;
      const activeWrap = document.querySelector(".preview-frame-wrap.is-active");
      const iframe = activeWrap?.querySelector(".preview-frame");
      resizeIframe(iframe, event.data.height);
    });

    document.querySelectorAll(".preview-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        const tool = tab.dataset.tool;
        document.querySelectorAll(".preview-tab").forEach((t) => t.classList.toggle("is-active", t === tab));
        document.querySelectorAll(".preview-frame-wrap").forEach((wrap) => {
          wrap.classList.toggle("is-active", wrap.id === "wrap-" + tool);
        });
        const iframe = document.querySelector("#wrap-" + tool + " .preview-frame");
        if (iframe) iframe.contentWindow?.postMessage({ type: "cdc-request-height" }, "*");
      });
    });
  </script>
</body>
</html>
